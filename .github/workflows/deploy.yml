name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# New pushes cancel in-progress BUILD jobs (cheap to restart).
# DEPLOY jobs are never canceled to avoid orphaned Pages deployments.
concurrency:
  group: pages-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      - name: Merge app dists into a single artifact
        run: |
          mkdir -p pages
          cp -r apps/generazioni-maxmara/dist/. pages/
          mkdir -p pages/unicredit-engagement
          cp -r apps/unicredit-engagement/dist/. pages/unicredit-engagement/
          mkdir -p pages/ferrari-racing
          cp -r apps/ferrari-racing/dist/. pages/ferrari-racing/
          mkdir -p pages/console
          cp -r apps/console/dist/. pages/console/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Skip if not latest commit on main
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api "repos/${{ github.repository }}/git/refs/heads/main" --jq '.object.sha')
          if [ "$latest" != "${{ github.sha }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Stale commit — skipping deploy (${{ github.sha }} is not $latest)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - id: deployment
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 900000
          # GitHub Pages backend occasionally returns transient
          # "Deployment failed, try again later" during syncing_files.
          error_count: 15

      # Retry once on transient GitHub Pages backend failures.
      - id: deployment-retry
        if: steps.guard.outputs.skip != 'true' && steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 900000
          error_count: 15
