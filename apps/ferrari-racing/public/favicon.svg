<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0B0B0D"/>

  <!-- Ferrari shield: x 1-19, pointer at y 31 -->
  <defs>
    <clipPath id="fav-sc">
      <path d="M1 1H19V23L10 31L1 23Z"/>
    </clipPath>
  </defs>
  <path d="M1 1H19V23L10 31L1 23Z" fill="#FFF200"/>

  <!-- Italian tricolor — vertical stripes, top 4 px -->
  <rect x="1"  y="1" width="6" height="4" fill="#009246"/>
  <rect x="7"  y="1" width="6" height="4" fill="#ffffff"/>
  <rect x="13" y="1" width="6" height="4" fill="#CE2B37"/>

  <!-- Prancing horse (Cavallino Rampante) — clipped to shield -->
  <g clip-path="url(#fav-sc)" fill="#111111">
    <!-- Body -->
    <ellipse cx="12" cy="16.5" rx="5.5" ry="3.8" transform="rotate(-18 12 16.5)"/>
    <!-- Head -->
    <ellipse cx="4.5" cy="10" rx="2.8" ry="2.3" transform="rotate(15 4.5 10)"/>
    <!-- Neck -->
    <polygon points="7,14 10.5,13 8.5,8.5 5,9.5"/>
    <!-- Ear -->
    <polygon points="6.5,7.5 8,5 9.5,7.5"/>
    <!-- Raised foreleg 1 (front) -->
    <rect x="5" y="7.5" width="2.5" height="8" rx="1.25" transform="rotate(-45 6.25 11.5)"/>
    <!-- Raised foreleg 2 (rear) -->
    <rect x="7.5" y="8" width="2.5" height="8" rx="1.25" transform="rotate(-35 8.75 12)"/>
    <!-- Left hind leg -->
    <rect x="8" y="19.5" width="2.5" height="10" rx="1.25"/>
    <!-- Right hind leg -->
    <rect x="12" y="20" width="2.5" height="9.5" rx="1.25"/>
    <!-- Tail (up-right) -->
    <path d="M16.5 15.5C18 13 19 10 18.5 7.5" stroke="#111111" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Adobe "A" mark — right column x 21-31 -->
  <!-- Outer triangle + triangular counter (evenodd = hole) -->
  <path fill-rule="evenodd"
    d="M26 10L21 28H31ZM26 16.5L23.5 25H28.5Z"
    fill="#ED2224"/>
</svg>
